<section class="py-3 py-md-4 py-lg-5">
    <div class="py-3 py-md-4 py-lg-5">
        <div class="container pt-3 pt-md-4 pt-lg-5">
            <div class="row">
                <div class="col-12 col-lg-6">
                    <app-title-section>
                        <span blue-text>Read our latest </span>
                        <span red-text>blog </span>
                        <span blue-second-text>for your insight</span>
                    </app-title-section>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-lg-8">
                    <app-text classes="bigSizeLowWeight gray-4 medium-line-height mb-3 mb-lg-5">
                        We start by getting to know our clients, their business goals, and their target audience. This involves conducting research.
                    </app-text>
                </div>
            </div>
            <div class="row">
                <div 
                    class="col-12 col-md-6 col-lg-4"
                    *ngFor="let blog of blogs">
                        <img [src]="blog.imagePath" alt="blog" class="w-100">
                        <app-text classes="bigSizeMediumWeight secondary-2 big-line-height mt-3 mt-lg-4 mb-3">{{ blog.title }}</app-text>
                        <app-text classes="bigSizeLowWeight gray-1 medium-line-height mt-3 mt-lg-4 mb-3">{{ blog.description }}</app-text>
                </div>
            </div>
            <mat-paginator 
                class="mt-4" 
                [length]="blogs.length"
                [pageSize]="4"
                [disabled]="false"
                [hidePageSize]="true"
                [pageSizeOptions]="[1, 2, 3]"
                (page)="handlePageEvent($event)">
                </mat-paginator>
        </div>
    </div>
</section>
