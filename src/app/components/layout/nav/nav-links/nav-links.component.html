<ul [class]="classes">
    <li class="nav-item me-4" *ngFor="let link of navLinks; let linkIndex = index;">
        <a 
            class="nav-link text-nowrap position-relative px-0 py-2" 
            *ngIf="linkIndex !== 2; else products"
            [ngClass]="setNavColor()"
            [routerLink]="link.path"
            routerLinkActive="active">
            <div class="animated-line position-absolute w-100"></div>
            <span>{{ link.title }}</span>
        </a>
        <ng-template #products>
            <a 
                [matMenuTriggerFor]="menu" 
                [routerLink]="link.path"
                [ngClass]="setNavColor()"
                routerLinkActive="active"
                class="d-flex nav-link text-nowrap position-relative px-0 py-2">
                <div class="animated-line position-absolute w-100"></div>
                <span>Products</span> <mat-icon class="m-0">keyboard_arrow_down</mat-icon>
            </a>
            <mat-menu #menu="matMenu" xPosition="before">
                <button mat-menu-item>ERB</button>
                <button mat-menu-item>CBC</button>
            </mat-menu>
        </ng-template>
    </li>
</ul>
